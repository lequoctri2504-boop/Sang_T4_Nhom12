<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Trị - Chữ Cái Vui Vẻ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body class="min-h-screen p-4 md:p-8">

    <nav class="navbar-admin max-w-7xl mx-auto mb-8 px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3 cursor-pointer" onclick="goHome()">
            <div class="w-10 h-10 bg-[#04647d] rounded-xl flex items-center justify-center text-white text-2xl">🏠</div>
            <span class="text-2xl font-black text-[#04647d]">Chữ Cái Vui Vẻ</span>
        </div>
        
        <div class="hidden md:flex items-center gap-4 font-bold text-slate-500">
            <button onclick="showTab('letters')" id="btn-letters" class="tab-btn active pb-1">⚙️ Quản Lý Chữ Cái</button>
            <button onclick="showTab('pets')" id="btn-pets" class="tab-btn pb-1 hover:text-[#04647d] transition">🐾 Quản Lý Thú Cưng</button>
            <button onclick="showTab('users')" id="btn-users" class="tab-btn pb-1 hover:text-[#04647d] transition">📊 Hoạt Động</button>
        </div>

        <button id="logout-btn" onclick="logout()" class="bg-[#ff4d4f] text-white px-6 py-2 rounded-full font-bold shadow-sm hover:scale-105 transition">Đăng xuất</button>
    </nav>

    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-8">
            <div>
                <p class="text-[#04647d] font-bold uppercase tracking-widest text-sm mb-1">Hệ Thống Quản Trị</p>
                <h1 id="admin-title" class="text-4xl font-black text-slate-800">Chào buổi sáng, Admin!</h1>
            </div>
            <button id="add-btn" onclick="addNew()" class="bg-[#04647d] text-white px-8 py-4 rounded-3xl font-black text-lg flex items-center gap-2 shadow-lg transition">
                <span>+</span> Thêm Mới
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="stat-card bg-white p-8 relative overflow-hidden">
                <h3 class="text-lg font-bold text-[#04647d] mb-2">Tiến Độ Hôm Nay</h3>
                <div class="flex items-end gap-2 h-20">
                    <div class="w-full bg-blue-100 rounded-t-lg h-1/2"></div>
                    <div class="w-full bg-blue-200 rounded-t-lg h-3/4"></div>
                    <div class="w-full bg-[#04647d] rounded-t-lg h-full"></div>
                </div>
            </div>
            <div class="stat-card bg-[#ffcdd2] p-8 flex flex-col items-center justify-center text-center">
                <p class="text-slate-600 font-bold">Câu trả lời đúng</p>
                <span class="text-5xl font-black text-[#b71c1c]">1,284</span>
            </div>
            <div class="stat-card bg-[#ffe082] p-8 flex flex-col items-center justify-center text-center">
                <p class="text-slate-600 font-bold">Thời gian học TB</p>
                <span class="text-5xl font-black text-[#f57f17]">18p</span>
            </div>
        </div>

        <div id="content-area">
            </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
