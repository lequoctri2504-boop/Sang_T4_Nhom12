<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#fff5e6"/>
  
  <!-- Grass -->
  <ellipse cx="100" cy="160" rx="80" ry="20" fill="#90ee90"/>
  
  <!-- Cow body -->
  <ellipse cx="100" cy="110" rx="55" ry="50" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- Cow head -->
  <circle cx="100" cy="60" r="30" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- Ears -->
  <ellipse cx="80" cy="35" rx="12" ry="20" fill="white" stroke="#333" stroke-width="2"/>
  <ellipse cx="120" cy="35" rx="12" ry="20" fill="white" stroke="#333" stroke-width="2"/>
  <ellipse cx="81" cy="38" rx="6" ry="12" fill="#ffb6c1"/>
  <ellipse cx="119" cy="38" rx="6" ry="12" fill="#ffb6c1"/>
  
  <!-- Eyes -->
  <circle cx="88" cy="55" r="7" fill="black"/>
  <circle cx="112" cy="55" r="7" fill="black"/>
  <circle cx="89" cy="54" r="3" fill="white"/>
  <circle cx="113" cy="54" r="3" fill="white"/>
  
  <!-- Nose with nostrils -->
  <circle cx="100" cy="70" r="8" fill="#ffb6c1"/>
  <circle cx="96" cy="71" r="2" fill="black"/>
  <circle cx="104" cy="71" r="2" fill="black"/>
  
  <!-- Horns -->
  <path d="M 85 30 Q 75 20 70 25" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 115 30 Q 125 20 130 25" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Spots on body -->
  <ellipse cx="75" cy="100" rx="18" ry="22" fill="#333"/>
  <ellipse cx="125" cy="115" rx="20" ry="25" fill="#333"/>
  
  <!-- Legs -->
  <rect x="78" y="155" width="12" height="35" fill="white" stroke="#333" stroke-width="2" rx="6"/>
  <rect x="105" y="155" width="12" height="35" fill="white" stroke="#333" stroke-width="2" rx="6"/>
  <rect x="90" y="155" width="12" height="35" fill="white" stroke="#333" stroke-width="2" rx="6"/>
  <rect x="117" y="155" width="12" height="35" fill="white" stroke="#333" stroke-width="2" rx="6"/>
</svg>