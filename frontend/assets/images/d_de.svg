<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#fff9e6"/>
  
  <!-- Grass -->
  <ellipse cx="100" cy="160" rx="80" ry="20" fill="#7cfc00"/>
  
  <!-- Goat body -->
  <ellipse cx="100" cy="115" rx="50" ry="45" fill="#d3d3d3" stroke="#333" stroke-width="2"/>
  
  <!-- Goat head -->
  <circle cx="100" cy="65" r="28" fill="#d3d3d3" stroke="#333" stroke-width="2"/>
  
  <!-- Goat ears (long and upright) -->
  <ellipse cx="82" cy="30" rx="10" ry="22" fill="#d3d3d3" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="118" cy="30" rx="10" ry="22" fill="#d3d3d3" stroke="#333" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="60" rx="6" ry="8" fill="yellow" stroke="#333" stroke-width="1"/>
  <ellipse cx="112" cy="60" rx="6" ry="8" fill="yellow" stroke="#333" stroke-width="1"/>
  <line x1="85" y1="60" x2="91" y2="60" stroke="black" stroke-width="1"/>
  <line x1="109" y1="60" x2="115" y2="60" stroke="black" stroke-width="1"/>
  
  <!-- Nose -->
  <circle cx="100" cy="73" r="5" fill="#ffb6c1"/>
  
  <!-- Mouth/beard -->
  <path d="M 100 78 L 98 85 L 102 85" stroke="#333" stroke-width="1.5" fill="none"/>
  
  <!-- Horns (curved upward) -->
  <path d="M 84 32 Q 75 15 78 8" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 116 32 Q 125 15 122 8" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Tail (small pom-pom) -->
  <circle cx="148" cy="110" r="8" fill="#d3d3d3" stroke="#333" stroke-width="1.5"/>
  
  <!-- Legs -->
  <rect x="78" y="155" width="10" height="35" fill="#d3d3d3" stroke="#333" stroke-width="2" rx="5"/>
  <rect x="108" y="155" width="10" height="35" fill="#d3d3d3" stroke="#333" stroke-width="2" rx="5"/>
  
  <!-- Hooves -->
  <ellipse cx="83" cy="190" rx="8" ry="6" fill="#333"/>
  <ellipse cx="113" cy="190" rx="8" ry="6" fill="#333"/>
</svg>