<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn Chủ Đề - Chữ Cái Vui Vẻ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .topic-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .topic-card:hover {
            transform: translateY(-10px) scale(1.05);
        }
    </style>
</head>
<body class="bg-[#e6ffc5] min-h-screen flex flex-col items-center justify-center p-6 text-center">
    
    <h1 class="text-5xl md:text-6xl font-black text-[#04647d] mb-16 drop-shadow-sm">
        Bé muốn học gì nào?
    </h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 max-w-[90rem] w-full px-4">
        
        <div onclick="location.href='letters.html'" 
             class="topic-card bg-white p-8 rounded-[3rem] shadow-xl cursor-pointer border-8 border-[#9ae1ff]">
            <span class="text-7xl block mb-4">📚</span>
            <h2 class="text-2xl font-bold text-[#04647d]">Học Chữ Cái</h2>
        </div>

        <div onclick="location.href='game.html'" 
             class="topic-card bg-white p-8 rounded-[3rem] shadow-xl cursor-pointer border-8 border-[#ffc2ca]">
            <span class="text-7xl block mb-4">🎮</span>
            <h2 class="text-2xl font-bold text-[#834b55]">Trò Chơi</h2>
        </div>

        <div onclick="location.href='pet_shop.html'" 
             class="topic-card bg-white p-8 rounded-[3rem] shadow-xl cursor-pointer border-8 border-[#feda57]">
            <span class="text-7xl block mb-4">🐶</span>
            <h2 class="text-2xl font-bold text-[#6e5a00]">Cửa Hàng</h2>
        </div>

        <div onclick="location.href='parents.html'" 
             class="topic-card bg-white p-8 rounded-[3rem] shadow-xl cursor-pointer border-8 border-[#d1d5db]">
            <span class="text-7xl block mb-4">👨‍👩‍👧</span>
            <h2 class="text-2xl font-bold text-[#4b5563]">Phụ Huynh</h2>
        </div>

    </div>

    <div class="mt-16">
        <button onclick="location.href='index.html'" class="text-[#04647d] font-bold hover:underline flex items-center gap-2">
            <span>⬅️ Quay lại trang chủ</span>
        </button>
    </div>

</body>
</html>
