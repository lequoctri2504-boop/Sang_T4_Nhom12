<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Tiếng Việt Bé Yêu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Be+Vietnam+Pro:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-sky: #9ae1ff;
            --primary-action: #04647d;
            --tertiary-sunny: #feda57;
            --surface-grass: #e6ffc5;
            --surface-container-lowest: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--surface-grass);
            font-family: 'Be Vietnam Pro', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: var(--surface-container-lowest);
            padding: 3.5rem;
            border-radius: 4rem;
            box-shadow: 0px 20px 40px rgba(29, 53, 0, 0.06);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 8px solid var(--primary-sky); /* Bo viền mềm mại */
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: var(--tertiary-sunny);
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0px 8px 0px #e0bc3d;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--primary-action);
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            padding: 1.2rem;
            border: 4px solid var(--surface-grass);
            border-radius: 2rem;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            padding: 1.3rem;
            background: var(--primary-action);
            color: white;
            border: none;
            border-radius: 3rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0px 10px 0px #024a5d;
            transition: all 0.1s;
        }

        .btn-login:active {
            transform: translateY(6px);
            box-shadow: 0px 4px 0px #024a5d;
        }

        .forgot-pass {
            margin-top: 2rem;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="avatar-circle">🐥</div>
        <h1>Chào Bé Yêu!</h1>
        
        <form>
            <input type="email" placeholder="Email của Ba Mẹ">
            <input type="password" placeholder="Mật mã">
            <!-- <button type="button" class="btn-login">VÀO CHƠI!</button> -->
             // Sửa nút VÀO CHƠI!
document.querySelector('.btn-login').onclick = function() {
window.location.href = "../trang_quan_tri/code.html"; //
};
        </form>
        
        <a href="#" class="forgot-pass">Ba mẹ quên mật khẩu?</a>
        <a href="register.html" style="color: var(--primary-action); font-weight: 700; display: block; margin-top: 10px; text-decoration: none;">Đăng ký tài khoản mới</a>
    </div>
</body>
</html>
