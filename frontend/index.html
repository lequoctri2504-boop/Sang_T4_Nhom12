<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chào Mừng Bé - Chữ Cái Vui Vẻ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background-color: #e6ffc5; font-family: 'Arial', sans-serif; }
        .char-option { width: 80px; height: 80px; background: #ffc2ca; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: 0.3s; }
        .char-option.selected { background: #feda57; transform: scale(1.2); box-shadow: 0 0 15px #feda57; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-[3rem] shadow-xl w-full max-w-md text-center">
        <h1 class="text-4xl font-black text-[#04647d] mb-4">Chào bé yêu!</h1>
        <p class="text-lg mb-8">Bé tên là gì nhỉ?</p>
        <input type="text" id="be-name" class="w-full p-4 bg-[#f3ffe0] border-none rounded-2xl text-2xl text-center mb-8 outline-none" placeholder="Tên của bé...">
        <p class="mb-4 font-bold text-[#04647d]">Chọn bạn nhỏ đồng hành:</p>
        <div class="flex justify-around mb-10">
            <div class="char-option" onclick="selectChar(this)">🐥</div>
            <div class="char-option" onclick="selectChar(this)">🐱</div>
            <div class="char-option" onclick="selectChar(this)">🐰</div>
        </div>
        <button onclick="batDau()" class="w-full bg-[#04647d] text-white py-4 rounded-full text-2xl font-bold shadow-lg active:scale-95 transition-all">Bắt đầu!</button>
    </div>
    <script>
        function selectChar(el) {
            document.querySelectorAll('.char-option').forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
        }
        function batDau() {
            const name = document.getElementById('be-name').value;
            if(!name) { alert("Bé ơi, hãy nhập tên nhé!"); return; }
            window.location.href = "chon_chu_de.html";
        }
    </script>
</body>
</html>
