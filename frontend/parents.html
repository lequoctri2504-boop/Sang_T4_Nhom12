<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phụ Huynh - Chữ Cái Vui Vẻ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #e6ffc5; }
        .auth-card { border-radius: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .input-field { border-radius: 1rem; transition: all 0.3s; border: 2px solid #e2e8f0; }
        .input-field:focus { border-color: #04647d; outline: none; box-shadow: 0 0 0 4px rgba(4, 100, 125, 0.1); }
        .tab-btn { transition: all 0.3s; border-bottom: 4px solid transparent; }
        .tab-btn.active { color: #04647d; border-color: #04647d; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="auth-card bg-white w-full max-w-md overflow-hidden flex flex-col">
        <div class="flex border-b">
            <button id="tab-login" onclick="switchTab('login')" class="tab-btn active flex-1 py-6 font-black text-xl text-gray-400">ĐĂNG NHẬP</button>
            <button id="tab-register" onclick="switchTab('register')" class="tab-btn flex-1 py-6 font-black text-xl text-gray-400">ĐĂNG KÝ</button>
        </div>

        <div class="p-10">
            <div class="text-center mb-8">
                <span class="text-5xl">👨‍👩‍👧</span>
                <h2 id="form-title" class="text-2xl font-black text-[#04647d] mt-4">Chào mừng phụ huynh!</h2>
                <p id="form-desc" class="text-gray-500">Vui lòng đăng nhập để quản lý việc học của bé.</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                    <input type="email" placeholder="phuhuynh@example.com" class="input-field w-full p-4 bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Mật khẩu</label>
                    <input type="password" placeholder="••••••••" class="input-field w-full p-4 bg-gray-50">
                </div>
                <button type="submit" class="w-full bg-[#04647d] text-white font-black py-4 rounded-2xl hover:bg-[#034d60] transition-colors shadow-lg">
                    VÀO CỬA HÀNG
                </button>
            </form>

            <form id="register-form" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Họ và Tên</label>
                    <input type="text" placeholder="Nguyễn Văn A" class="input-field w-full p-4 bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                    <input type="email" placeholder="phuhuynh@example.com" class="input-field w-full p-4 bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Mật khẩu mới</label>
                    <input type="password" placeholder="Tối thiểu 8 ký tự" class="input-field w-full p-4 bg-gray-50">
                </div>
                <button type="submit" class="w-full bg-[#7bbf22] text-white font-black py-4 rounded-2xl hover:bg-[#68a31b] transition-colors shadow-lg">
                    TẠO TÀI KHOẢN
                </button>
            </form>

            <div class="mt-8 text-center">
                <a href="topics.html" class="text-gray-400 font-bold hover:text-[#04647d] transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                    Quay lại chọn chủ đề
                </a>
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const tabLogin = document.getElementById('tab-login');
            const tabReg = document.getElementById('tab-register');
            const title = document.getElementById('form-title');
            const desc = document.getElementById('form-desc');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                regForm.classList.add('hidden');
                tabLogin.classList.add('active');
                tabReg.classList.remove('active');
                title.innerText = "Chào mừng phụ huynh!";
                desc.innerText = "Vui lòng đăng nhập để quản lý việc học của bé.";
            } else {
                loginForm.classList.add('hidden');
                regForm.classList.remove('hidden');
                tabLogin.classList.remove('active');
                tabReg.classList.add('active');
                title.innerText = "Đăng ký thành viên";
                desc.innerText = "Tạo tài khoản để nhận nhiều ưu đãi cho bé nhé!";
            }
        }

        // Xử lý chặn load trang khi submit (để demo)
       // Xử lý khi nhấn nút Đăng Nhập hoặc Đăng Ký
        document.querySelectorAll('form').forEach(form => {
            form.onsubmit = (e) => {
                e.preventDefault(); // Ngăn trang web bị load lại

                // Giả lập kiểm tra đăng nhập thành công
                // Trong thực tế, bạn sẽ gửi dữ liệu lên Server ở đây
                
                console.log("Đang đăng nhập...");

                // Chuyển hướng sang trang dành cho phụ huynh
                window.location.href = "danh_cho_phu_huynh.html";
            };
        });
    </script>
</body>
</html>
