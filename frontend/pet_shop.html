<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Thú Cưng Của Bé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/pet_shop.css">
</head>
<body class="bg-[#fff5e6] min-h-screen flex flex-col items-center p-6 font-['Plus_Jakarta_Sans']">
    
    <header class="w-full max-w-5xl flex justify-between items-center mb-12">
        <button onclick="location.href='index.html'" class="bg-white px-6 py-2 rounded-full font-bold text-[#d46a00] shadow-sm hover:bg-orange-50 transition-colors">
            ← Quay lại
        </button>
        <h1 class="text-4xl font-black text-[#d46a00]">Cửa Hàng Thú Cưng 🐾</h1>
        <div class="bg-[#feda57] px-8 py-3 rounded-full font-bold text-[#6e5a00] shadow-md text-xl">
            Túi sao của bé: ⭐ <span id="star-count">0</span>
        </div>
    </header>

    <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-5xl w-full pb-20" id="pet-list">
        </main>

    <div id="success-overlay" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden backdrop-blur-sm p-6">
        <div class="bg-white rounded-[3rem] p-12 shadow-2xl text-center max-w-lg w-full animate-popIn">
            <div class="text-8xl mb-4">🥳</div>
            <h2 class="text-4xl font-black text-[#7bbf22] mb-4">Chúc mừng bé!</h2>
            <p class="text-xl text-[#04647d] font-bold mb-8" id="success-msg"></p>
            <button onclick="closeSuccess()" class="w-full bg-[#04647d] text-white py-4 rounded-full font-bold text-xl shadow-lg">Bé cảm ơn!</button>
        </div>
    </div>

    <script src="assets/js/pet_shop.js"></script>
</body>
</html>
