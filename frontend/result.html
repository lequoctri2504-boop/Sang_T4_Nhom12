<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết Quả Của Bé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/result.css">
</head>
<body class="bg-[#e6ffc5] min-h-screen flex items-center justify-center p-4">
    
    <div class="result-card p-10 shadow-[0_20px_50px_rgba(0,0,0,0.1)] text-center max-w-md w-full relative overflow-hidden">
        
        <div id="stars-container">
            <span class="star-glow star-pop">⭐</span>
            <span class="star-glow star-pop">⭐</span>
            <span class="star-glow star-pop">⭐</span>
            <span class="star-glow star-pop">⭐</span>
            <span class="star-glow star-pop">⭐</span>
        </div>
        
        <h2 class="text-2xl font-bold text-[#834b55] mb-2">Chúc mừng bé!</h2>
        <h1 id="result-message" class="text-4xl font-black text-[#04647d] mb-10 leading-tight">Bé Thật Tuyệt Vời!</h1>
        
        <div class="flex flex-col gap-4">
            <button id="play-again-btn" class="btn-bounce w-full bg-[#04647d] text-white py-5 rounded-3xl font-bold text-2xl shadow-[0_10px_20px_rgba(4,100,125,0.3)]">
                CHƠI LẠI
            </button>

            <button onclick="location.href='game.html'" class="btn-bounce w-full bg-white border-4 border-[#04647d] text-[#04647d] py-4 rounded-3xl font-bold text-xl hover:bg-[#f0fdf4]">
                TRANG CHỦ
            </button>
        </div>

        <div class="deco-circle -top-10 -right-10 w-32 h-32 bg-[#feda57] opacity-20"></div>
        <div class="deco-circle -bottom-10 -left-10 w-32 h-32 bg-[#ffc2ca] opacity-30"></div>
    </div>

    <script src="assets/js/result.js"></script>
</body>
</html>
