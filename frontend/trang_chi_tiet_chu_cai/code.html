<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Chữ Cái - Tiếng Việt Bé Yêu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette logic từ DESIGN.md */
            --primary-sky: #9ae1ff;
            --primary-action: #04647d;
            --secondary-soft-pink: #ffc2ca;
            --tertiary-sunny: #feda57;
            --surface-grass: #e6ffc5;
            --surface-container-low: #f3ffe0;
            --surface-container-lowest: #ffffff;
            --on-background: #1d3500;
        }

        body {
            margin: 0;
            background-color: var(--surface-grass);
            font-family: 'Be Vietnam Pro', sans-serif;
            color: var(--on-background);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header & Quay lại */
        .header {
            width: 100%;
            max-width: 800px;
            display: flex;
            margin-bottom: 30px;
        }

        .btn-back {
            background: var(--surface-container-lowest);
            border: none;
            padding: 18px 30px;
            border-radius: 3rem; /* xl rounding */
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            box-shadow: 0px 20px 40px rgba(29, 53, 0, 0.06);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-back:active { transform: scale(0.95); }

        /* Container chính */
        .learning-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2.5rem;
            width: 100%;
            max-width: 1000px;
            align-items: start;
        }

        /* 1. Khu vực Chữ cái Hero */
        .letter-hero {
            background: var(--surface-container-lowest);
            border-radius: 4rem; /* Cực kỳ bo tròn */
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0px 20px 40px rgba(29, 53, 0, 0.06); /* Ambient shadows */
        }

        .display-letter {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 12rem; /* Heroic size */
            margin: 0;
            line-height: 1;
            background: linear-gradient(15deg, var(--primary-action), var(--primary-sky));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            animation: wobble 3s infinite ease-in-out; /* Motion Signature */
        }

        .instruction-text {
            font-size: 1.5rem;
            margin-top: 20px;
            font-weight: 500;
            opacity: 0.8;
        }

        /* 2. Khu vực Ví dụ & Âm thanh */
        .example-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .example-card {
            background: var(--surface-container-lowest);
            border-radius: 3rem;
            padding: 40px;
            text-align: center;
            box-shadow: 0px 20px 40px rgba(29, 53, 0, 0.06);
        }

        .example-image {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: var(--secondary-soft-pink);
            border-radius: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            margin-bottom: 25px;
        }

        .example-word {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 3rem;
            margin: 0;
        }

        .highlight {
            color: var(--primary-action);
            background: var(--surface-container-low);
            padding: 0 10px;
            border-radius: 10px;
        }

        /* 3. Nút Loa khổng lồ */
        .btn-audio-huge {
            background: var(--tertiary-sunny);
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0px 12px 0px #e0bc3d; /* Tonal layering tạo độ dày */
            transition: all 0.1s;
        }

        .btn-audio-huge:active {
            transform: translateY(8px);
            box-shadow: 0px 4px 0px #e0bc3d;
        }

        /* Animation wobble từ DESIGN.md */
        @keyframes wobble {
            0%, 100% { transform: rotate(-3deg) scale(1); }
            50% { transform: rotate(3deg) scale(1.02); }
        }

        @media (max-width: 850px) {
            .learning-grid { grid-template-columns: 1fr; }
            .display-letter { font-size: 10rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn-back" onclick="window.location.href='../trang_hoc_tap/code.html'">⬅ Quay lại</button>
    </div>

    <div class="learning-grid">
        <div class="letter-hero">
            <h1 class="display-letter" onclick="playAudio('A')">A</h1>
            <p class="instruction-text">Bé chạm vào chữ nhé!</p>
            
            <div style="margin-top: 40px;">
                <button class="btn-audio-huge" onclick="playAudio('A')">🔊</button>
                <p style="text-align: center; font-weight: 600; margin-top: 15px;">Nghe đọc</p>
            </div>
        </div>

        <div class="example-section">
            <div class="example-card">
                <div class="example-image">
                    🍎
                </div>
                <h2 class="example-word">
                    <span class="highlight">A</span>pple
                </h2>
                <p style="font-size: 1.25rem; margin-top: 10px;">Quả táo</p>
            </div>
            
            </div>
    </div>

    <script>
        function playAudio(letter) {
            // Giả lập phát âm thanh Vietnamese-First
            console.log("Phát âm chuẩn chữ: " + letter);
            
            // Hiệu ứng phản hồi xúc giác (Visual Feedback)
            const letterEl = document.querySelector('.display-letter');
            letterEl.style.transform = 'scale(1.3) rotate(0deg)';
            
            // Sau khi phát xong thì trả về trạng thái cũ
            setTimeout(() => {
                letterEl.style.transform = '';
            }, 300);
        }
    </script>
</body>
</html>
