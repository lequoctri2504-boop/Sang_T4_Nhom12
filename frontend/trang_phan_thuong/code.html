<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Báu Của Bé - Tiếng Việt Bé Yêu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Be+Vietnam+Pro:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-sky: #9ae1ff;
            --primary-action: #04647d;
            --secondary-soft-pink: #ffc2ca;
            --tertiary-sunny: #feda57;
            --surface-grass: #e6ffc5;
            --surface-container-low: #f3ffe0;
            --surface-container-lowest: #ffffff;
            --on-background: #1d3500;
        }

        body {
            margin: 0;
            background-color: var(--surface-grass);
            font-family: 'Be Vietnam Pro', sans-serif;
            color: var(--on-background);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* 1. Header: Ngôi sao tích lũy */
        .reward-header {
            background: linear-gradient(180deg, var(--primary-sky), transparent);
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 4rem 4rem;
        }

        .star-badge {
            background: var(--tertiary-sunny);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 15px 40px;
            border-radius: 3rem;
            box-shadow: 0px 10px 0px #e0bc3d;
            transform: rotate(-2deg);
        }

        .star-count {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--on-background);
        }

        /* 2. Kho đồ / Sticker Grid */
        .collection-section {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 25px;
        }

        /* Tonal Layering cho Sticker */
        .sticker-item {
            background: var(--surface-container-lowest);
            aspect-ratio: 1/1;
            border-radius: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 20px 40px rgba(29, 53, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
        }

        .sticker-item:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Trạng thái chưa mở khóa (Ghost Border) */
        .sticker-locked {
            opacity: 0.4;
            background: var(--surface-container-low);
            box-shadow: none;
            border: 4px dashed rgba(4, 100, 125, 0.15); /* Ghost Border */
        }

        .sticker-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .sticker-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary-action);
        }

        .lock-icon {
            position: absolute;
            bottom: 15px;
            font-size: 1.2rem;
        }

        /* 3. Nút hành động */
        .navigation {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .btn-nav {
            background: var(--primary-action);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 2rem;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            box-shadow: 0px 10px 20px rgba(4, 100, 125, 0.2);
            cursor: pointer;
        }

        /* Hiệu ứng lấp lánh cho ngôi sao */
        @keyframes twinkle {
            0%, 100% { transform: scale(1) rotate(-2deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }
        .star-badge { animation: twinkle 3s infinite ease-in-out; }
    </style>
</head>
<body>

    <header class="reward-header">
        <div class="star-badge">
            <span style="font-size: 3.5rem;">⭐</span>
            <span class="star-count">125</span>
        </div>
        <p style="margin-top: 20px; font-weight: 600;">Bé đang là "Nhà Thám Hiểm Nhí"!</p>
    </header>

    <main class="collection-section">
        <h2>Bộ Sưu Tập Sticker</h2>
        
        <div class="sticker-grid">
            <div class="sticker-item" onclick="playPop()">
                <div class="sticker-icon">🍎</div>
                <div class="sticker-name">Quả Táo</div>
            </div>

            <div class="sticker-item" onclick="playPop()">
                <div class="sticker-icon">🐝</div>
                <div class="sticker-name">Con Ong</div>
            </div>

            <div class="sticker-item" onclick="playPop()">
                <div class="sticker-icon">🐱</div>
                <div class="sticker-name">Con Mèo</div>
            </div>

            <div class="sticker-locked sticker-item">
                <div class="sticker-icon" style="filter: grayscale(1);">🦖</div>
                <div class="sticker-name">Khủng Long</div>
                <div class="lock-icon">🔒 50 ⭐</div>
            </div>

            <div class="sticker-locked sticker-item">
                <div class="sticker-icon" style="filter: grayscale(1);">🚀</div>
                <div class="sticker-name">Tên Lửa</div>
                <div class="lock-icon">🔒 100 ⭐</div>
            </div>
            
            <div class="sticker-locked sticker-item">
                <div class="sticker-icon" style="filter: grayscale(1);">🍦</div>
                <div class="sticker-name">Kem Bơ</div>
                <div class="lock-icon">🔒 150 ⭐</div>
            </div>
        </div>
    </main>

    <div class="navigation">
        <button class="btn-nav" onclick="window.history.back()">Quay Lại</button>
        <button class="btn-nav" style="background: var(--tertiary-sunny); color: var(--on-background);">Đổi Quà 🎁</button>
    </div>

    <script>
        function playPop() {
            // Hiệu ứng âm thanh "Pop" khi bé nhấn vào sticker
            console.log("Sticker popped!");
            // Thêm logic rung phản hồi nếu trên thiết bị di động
            if (navigator.vibrate) navigator.vibrate(50);
        }
    </script>
</body>
</html>
