<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tô Chữ Vui Vẻ - Tiếng Việt Bé Yêu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Be+Vietnam+Pro:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-sky: #9ae1ff;
            --primary-action: #04647d;
            --surface-grass: #e6ffc5;
            --surface-container-lowest: #ffffff;
            --tertiary-sunny: #feda57;
            --on-background: #1d3500;
        }

        body {
            margin: 0;
            background-color: var(--surface-grass);
            font-family: 'Be Vietnam Pro', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* Ngăn chặn cuộn trang khi bé đang vẽ */
        }

        /* Thanh công cụ phía trên */
        .toolbar {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .btn-round {
            background: var(--surface-container-lowest);
            border: none;
            padding: 15px 25px;
            border-radius: 2rem; /* xl rounding */
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            box-shadow: 0px 10px 20px rgba(29, 53, 0, 0.06);
            cursor: pointer;
        }

        /* Khu vực bảng vẽ */
        .canvas-container {
            position: relative;
            background: var(--surface-container-lowest);
            border-radius: 4rem;
            box-shadow: 0px 20px 40px rgba(29, 53, 0, 0.06);
            margin-top: 10px;
            cursor: crosshair;
        }

        /* Chữ cái mờ làm mẫu dưới nền */
        .letter-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 25rem; /* Heroic monumental size */
            color: var(--primary-sky);
            opacity: 0.2; /* Mờ để bé tô đè lên */
            user-select: none;
            pointer-events: none;
        }

        canvas {
            border-radius: 4rem;
            display: block;
        }

        /* Nút xóa/làm lại dưới cùng */
        .actions {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .btn-action {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0px 10px 0px rgba(0,0,0,0.1);
            transition: all 0.1s;
        }

        .btn-clear { background: var(--tertiary-sunny); color: var(--on-background); }
        .btn-done { background: var(--primary-action); color: white; }

        .btn-action:active {
            transform: translateY(5px);
            box-shadow: 0px 5px 0px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn-round" onclick="window.history.back()">⬅ Quay lại</button>
        <div style="font-family: 'Plus Jakarta Sans'; font-size: 1.5rem; color: var(--primary-action);">Bé tô chữ A</div>
        <button class="btn-round" style="background: var(--tertiary-sunny);">Ngôi sao: ⭐ 5</button>
    </div>

    <div class="canvas-container" id="container">
        <div class="letter-guide">A</div>
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="actions">
        <button class="btn-action btn-clear" onclick="clearCanvas()" title="Xóa hết">🧹</button>
        <button class="btn-action btn-done" onclick="saveDrawing()" title="Hoàn thành">✨</button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let isPainting = false;

        // Thiết lập kích thước canvas dựa trên màn hình
        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.85;
            canvas.height = window.innerHeight * 0.6;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Cấu hình nét vẽ "Mềm mại" (Tactile Signature)
        ctx.strokeStyle = '#04647d'; // primary-action
        ctx.lineWidth = 25; // Nét to cho bé dễ vẽ
        ctx.lineCap = 'round'; // Bo tròn đầu nét vẽ
        ctx.lineJoin = 'round';

        function startPosition(e) {
            isPainting = true;
            draw(e);
        }

        function finishedPosition() {
            isPainting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isPainting) return;
            
            // Lấy tọa độ (hỗ trợ cả chuột và cảm ứng)
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Event Listeners
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', startPosition);
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', draw);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function saveDrawing() {
            alert("Bé giỏi quá! Chữ A thật là đẹp! 🥳");
        }
    </script>
</body>
</html>
