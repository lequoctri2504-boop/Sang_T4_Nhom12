<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .letter-shadow {
      text-shadow: 0 0 0 transparent;
      -webkit-text-stroke: 4px #04647d;
      color: transparent;
    }
    .tactile-card {
      box-shadow: 0px 20px 40px rgba(29, 53, 0, 0.06);
    }
    body {
      overflow-x: hidden;
      background-color: #e6ffc5;
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-highest": "#98f500",
            "surface-tint": "#04647d",
            "tertiary": "#6e5a00",
            "on-primary-fixed": "#003d4f",
            "surface-container-lowest": "#ffffff",
            "primary": "#04647d",
            "inverse-primary": "#9ae1ff",
            "on-background": "#1d3500",
            "secondary-fixed": "#ffc2ca",
            "surface-bright": "#e6ffc5",
            "outline": "#508400",
            "surface-container": "#acff46",
            "on-primary-container": "#005267",
            "inverse-surface": "#061100",
            "secondary": "#834b55",
            "secondary-container": "#ffc2ca",
            "on-surface": "#1d3500",
            "tertiary-container": "#feda57",
            "surface": "#e6ffc5",
            "surface-variant": "#98f500",
            "surface-container-low": "#d2ff9c",
            "on-primary": "#e3f6ff",
            "on-surface-variant": "#3d6600",
            "background": "#e6ffc5",
            "surface-container-high": "#9ffb21",
            "outline-variant": "#7bbf22",
            "primary-container": "#9ae1ff"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Plus Jakarta Sans"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
</head>
<body class="font-body text-on-background selection:bg-secondary-container">
<!-- SideNavBar -->
<aside class="fixed left-0 top-0 h-screen w-64 flex flex-col py-8 z-40 bg-white dark:bg-slate-900 rounded-r-[3rem] shadow-[0px_20px_40px_rgba(29,53,0,0.06)] hidden md:flex">
<div class="px-8 mb-10">
<div class="flex items-center gap-3 mb-2">
<div class="w-12 h-12 rounded-full overflow-hidden bg-primary-container">
<img alt="Avatar" data-alt="cute illustrated cartoon baby character with a friendly smile, soft pastel colors, simple shapes for toddlers" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrAJkbjXIBvoDCiy-fcpmAcNR9KU_jHt5fP2bfBoiBriuhUTV5cthj1tkyT0uJ4hNYxWczVcJb941KJaD8-3j9vvwoqA2ore0aQYOdS0JZtdFIJjuvQMNIqvZIrb3PljarjyePMfSEPMLDEHCp2ts5gLpc1jBsyNMrhxqwPGkIeB4tbQmSaLQpyhvjzH5G5Mfqi3aejYN9D0uV-v2P3UbSXIj8o0EBuUWSUuxY9C7Th8g0yqAm62ntOjwd363NXjkygKSXiGKk7L4k"/>
</div>
<div>
<h3 class="font-headline font-bold text-primary leading-tight">Chào bé!</h3>
<p class="text-xs text-on-background opacity-60">Hôm nay học chữ gì nhỉ?</p>
</div>
</div>
</div>
<nav class="flex-1 space-y-2">
<a class="text-[#1d3500] dark:text-emerald-50 px-4 py-3 flex items-center gap-3 hover:bg-[#ffc2ca]/20 rounded-full mx-2 transition-all" href="#">
<span class="material-symbols-outlined text-primary">school</span>
<span class="font-headline font-bold text-md">Học Tập</span>
</a>
<a class="text-[#1d3500] dark:text-emerald-50 px-4 py-3 flex items-center gap-3 hover:bg-[#ffc2ca]/20 rounded-full mx-2 transition-all" href="#">
<span class="material-symbols-outlined text-primary">quiz</span>
<span class="font-headline font-bold text-md">Câu Đố</span>
</a>
<!-- Active Tab: Trò Chơi -->
<a class="bg-[#9ae1ff] dark:bg-[#04647d] text-[#04647d] dark:text-white rounded-full mx-2 px-4 py-3 flex items-center gap-3 scale-95 transition-all" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
<span class="font-headline font-bold text-md">Trò Chơi</span>
</a>
</nav>
<div class="mt-auto px-2">
<a class="text-[#1d3500] dark:text-emerald-50 px-4 py-3 flex items-center gap-3 hover:bg-[#ffc2ca]/20 rounded-full transition-all" href="#">
<span class="material-symbols-outlined opacity-60">settings_accessibility</span>
<span class="font-headline font-bold text-md">Phụ Huynh</span>
</a>
</div>
</aside>
<!-- Main Canvas -->
<main class="md:ml-64 min-h-screen flex flex-col relative overflow-hidden">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 py-4 bg-[#e6ffc5] dark:bg-emerald-950/20 z-30 sticky top-0">
<div class="flex items-center gap-2">
<span class="text-2xl font-black text-[#04647d] dark:text-[#9ae1ff] tracking-tight">Chữ Cái Vui Vẻ</span>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center text-[#04647d] hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined text-2xl">account_circle</span>
</button>
</div>
</header>
<!-- Game Content Area -->
<section class="flex-1 flex flex-col items-center justify-center px-8 pb-12 relative">
<!-- Decorative Elements -->
<div class="absolute top-10 left-10 opacity-20 transform -rotate-12">
<span class="material-symbols-outlined text-8xl text-primary">cloud</span>
</div>
<div class="absolute bottom-20 right-10 opacity-20 transform rotate-12">
<span class="material-symbols-outlined text-9xl text-secondary">eco</span>
</div>
<!-- Instruction Title -->
<div class="text-center mb-12">
<h1 class="font-headline text-3xl md:text-4xl font-extrabold text-primary mb-2">Bé hãy ghép chữ B nhé!</h1>
<p class="font-body text-lg text-on-background/70 font-medium">Kéo chữ cái đúng vào ô trống!</p>
</div>
<!-- Main Interaction Zone (Bento-inspired Layout) -->
<div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
<!-- Target Letter Shadow -->
<div class="lg:col-span-7 flex justify-center">
<div class="relative w-80 h-[28rem] md:w-[28rem] flex items-center justify-center bg-surface-container-lowest rounded-xl tactile-card border-dashed border-4 border-outline/30">
<span class="text-[20rem] md:text-[24rem] font-headline font-black letter-shadow select-none">B</span>
<!-- Context Hint: Con Bò -->
<div class="absolute -bottom-6 -right-6 bg-tertiary-container p-4 rounded-lg shadow-lg rotate-6">
<div class="flex flex-col items-center">
<img alt="Cow" class="w-16 h-16 mb-1" data-alt="cute cartoon illustrated cow with friendly eyes, standing on green grass, bright colors for kids" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHAXkBqI7vtKRA3imY5lgB-XYLP0oW-WoVQYFy5ZS7oRuJfWoEe0Bl2Y3zTDfsU3ebFUvyL7yrwOmtc5m7qeyXrD-VWWxIElQubRqsoWHbXL1izY8FjagmyXwdlJM3zwEp5kifcY7DNFfecJpkqwWCPU7_kbVJ7RoDth3H0fvbFxhMMmFVDvkWuvEC-xZF7qXxjBbytXGKVEA5wYW2IiwklWnOkicdUse0kPV9aXRxqnWSXecNWHl001rZ1y19mO9Fbhgtug6hpS9P"/>
<span class="font-headline font-bold text-tertiary">Con Bò</span>
</div>
</div>
</div>
</div>
<!-- Selection Dock -->
<div class="lg:col-span-5 flex flex-col gap-6">
<div class="bg-surface-container-low/50 p-8 rounded-xl flex flex-wrap lg:flex-col items-center justify-center gap-8">
<!-- Option A -->
<button class="group w-32 h-32 md:w-40 md:h-40 bg-secondary-container rounded-xl flex items-center justify-center tactile-card hover:scale-110 active:scale-90 transition-all cursor-grab active:cursor-grabbing">
<span class="text-6xl md:text-8xl font-headline font-black text-secondary">A</span>
</button>
<!-- Option B (Correct) -->
<button class="group w-32 h-32 md:w-40 md:h-40 bg-primary-container rounded-xl flex items-center justify-center tactile-card hover:scale-110 active:scale-90 transition-all cursor-grab active:cursor-grabbing ring-offset-4 ring-primary/20 hover:ring-4">
<span class="text-6xl md:text-8xl font-headline font-black text-primary">B</span>
</button>
<!-- Option C -->
<button class="group w-32 h-32 md:w-40 md:h-40 bg-tertiary-container rounded-xl flex items-center justify-center tactile-card hover:scale-110 active:scale-90 transition-all cursor-grab active:cursor-grabbing">
<span class="text-6xl md:text-8xl font-headline font-black text-tertiary">C</span>
</button>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-16 flex gap-6">
<button class="px-8 py-4 bg-white text-primary font-headline font-bold rounded-full tactile-card hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
<span class="material-symbols-outlined">refresh</span>
          Làm lại
        </button>
<button class="px-10 py-4 bg-primary text-white font-headline font-bold rounded-full tactile-card hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
          Tiếp tục
        </button>
</div>
</section>
<!-- Footer Component -->
<footer class="w-full py-6 flex flex-col items-center gap-2 opacity-60 bg-transparent">
<p class="font-['Be_Vietnam_Pro'] text-sm text-[#834b55] dark:text-[#ffc2ca]">
        © 2024 The Playful Voyager - Học Tiếng Việt Thật Vui
      </p>
<div class="flex gap-4">
<a class="text-sm text-[#1d3500]/40 hover:underline" href="#">Cài đặt</a>
<a class="text-sm text-[#1d3500]/40 hover:underline" href="#">Hướng dẫn</a>
</div>
</footer>
<!-- Celebration Effect Placeholder Overlay (Hidden by default, ready for "Success") -->
<div class="fixed inset-0 pointer-events-none z-50 flex items-center justify-center opacity-0">
<!-- Success Star Burst -->
<div class="absolute inset-0 bg-white/30 backdrop-blur-sm"></div>
<div class="relative flex flex-col items-center animate-bounce">
<span class="material-symbols-outlined text-[10rem] text-tertiary-container" style="font-variation-settings: 'FILL' 1;">star</span>
<h2 class="text-4xl font-headline font-black text-primary">Tuyệt vời!</h2>
</div>
</div>
</main>
<!-- Mobile Bottom Nav (Suppressed per "The Destination Rule" for Task-Focused focus, but keeping consistent structure) -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white shadow-lg flex justify-around py-4 z-40 rounded-t-xl">
<button class="flex flex-col items-center text-primary opacity-60">
<span class="material-symbols-outlined">school</span>
<span class="text-xs font-bold">Học</span>
</button>
<button class="flex flex-col items-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
<span class="text-xs font-bold">Chơi</span>
</button>
<button class="flex flex-col items-center text-primary opacity-60">
<span class="material-symbols-outlined">settings_accessibility</span>
<span class="text-xs font-bold">Bố mẹ</span>
</button>
</nav>
</body></html>
